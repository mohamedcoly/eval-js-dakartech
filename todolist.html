<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ma To-Do List</title>
    <link rel="stylesheet" href="css.css">
</head>
<body>
    <div class="container">
        <h1>Ma To-Do List</h1>
        <form id="todo-form">
            <input type="text" id="todo-input" placeholder="Ajouter une tâche...">
            <button type="submit">Ajouter</button>
        </form>
        <div id="error-message" class="error"></div>
        <div class="filters">
            <button class="filter-btn active" data-filter="all">Toutes</button>
            <button class="filter-btn" data-filter="pending">En cours</button>
            <button class="filter-btn" data-filter="completed">Terminées</button>
        </div>
        <div id="tasks-list"></div>
        <div class="counter" id="counter">0 tâche(s) en cours</div>
    </div>

    <script src="scriptt.js"></script>
</body>
</html>
